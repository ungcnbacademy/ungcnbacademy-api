<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Under Construction</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      main {
        width: min(640px, 100%);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.25rem, 7vw, 4.5rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0 auto;
        max-width: 42rem;
        color: #46536a;
        font-size: 1.125rem;
        line-height: 1.65;
      }

      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 28px;
        border: 4px solid #172033;
        border-radius: 18px;
        display: grid;
        place-items: center;
        font-size: 2rem;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">!</div>
      <h1>Under Construction</h1>
      <p>This service is temporarily offline while updates are being prepared. Please check back later.</p>
    </main>
  </body>
</html>
